<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coding Round — Pyrefly Assessment</title>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    .coding-page { display: grid; grid-template-columns: 400px 1fr; height: 100vh; overflow: hidden; }
    
    .problem-panel { 
        padding: 40px; 
        border-right: 1px solid var(--border); 
        background: rgba(255,255,255,0.02); 
        overflow-y: auto;
    }
    .problem-title { font-size: 1.6rem; margin-bottom: 20px; color: var(--accent-light); }
    .problem-desc { line-height: 1.7; color: var(--text-secondary); margin-bottom: 32px; }
    .problem-meta { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 15px; }

    .editor-panel { display: flex; flex-direction: column; padding: 20px; }
    #code-editor {
        flex: 1;
        background: #0d1117;
        color: #e6edf3;
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 24px;
        font-family: 'Fira Code', monospace;
        font-size: 1rem;
        line-height: 1.5;
        resize: none;
        outline: none;
    }
    
    .action-bar { padding: 20px 0 0; display: flex; justify-content: flex-end; gap: 16px; }

    #loading-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: var(--bg-dark); z-index: 1000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    
    #result-modal {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.85); z-index: 2000;
        display: none; align-items: center; justify-content: center;
        padding: 40px;
    }
    .result-content {
        max-width: 800px; width: 100%; max-height: 85vh;
        overflow-y: auto; padding: 48px;
    }
    pre { white-space: pre-wrap; word-wrap: break-word; color: var(--text-secondary); line-height: 1.6; }
  </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h2 style="margin-top:20px;">Fetching Question…</h2>
    </div>

    <div id="result-modal">
        <div class="glass-card result-content">
            <h1 class="gradient-text">Evaluation Complete</h1>
            <div id="ai-feedback" style="margin-top:24px;"></div>
            <div class="mt-8">
                <a href="/dashboard.html" class="btn btn-primary">Return to Dashboard</a>
            </div>
        </div>
    </div>

    <nav class="top-nav" style="position:fixed; top:0; left:0; right:0; padding: 20px 40px; display:flex; justify-content: space-between; align-items:center; z-index:1000; background:rgba(5,9,20,0.4); backdrop-filter:blur(10px); border-bottom:1px solid var(--border);">
        <div class="brand">Pyrefly<span>IQ</span></div>
        <div style="display:flex; gap:20px; align-items:center;">
            <a href="/dashboard" class="nav-link" style="color:var(--text-secondary); text-decoration:none; font-size:0.9rem;">Dashboard</a>
            <button id="logout-btn" class="btn btn-outline" style="padding:8px 20px; font-size:0.85rem;">Logout</button>
        </div>
    </nav>

    <main class="coding-page" style="margin-top: 60px;">
        <div class="problem-panel">
            <div class="brand" style="margin-bottom:40px;">Pyrefly<span>IQ</span></div>
            <div class="round-badge badge badge-success">Coding Round</div>
            <h1 class="problem-title" id="q-title">...</h1>
            <p class="problem-desc" id="q-desc">...</p>
            <div class="problem-meta">
                <span id="q-diff">Difficulty: ...</span>
                <span id="q-cat">Category: ...</span>
            </div>
        </div>

        <div class="editor-panel">
            <textarea id="code-editor" spellcheck="false"></textarea>
            <div class="action-bar">
                <button id="submit-code" class="btn btn-primary" style="padding:12px 36px;">Submit Solution</button>
            </div>
        </div>
    </main>

    <script>
        let currentQuestionId = "";

        async function init() {
            try {
                const res = await fetch('/api/coding/start');
                const q = await res.json();
                
                document.getElementById('q-title').textContent = q.title;
                document.getElementById('q-desc').textContent = q.description;
                document.getElementById('q-diff').textContent = `Difficulty: ${q.difficulty}`;
                document.getElementById('q-cat').textContent = `Category: ${q.category}`;
                document.getElementById('code-editor').value = q.starter_code;
                currentQuestionId = q.id;
                
                document.getElementById('loading-overlay').style.display = 'none';
            } catch (e) {
                alert("Failed to load question");
            }
        }

        document.getElementById('submit-code').addEventListener('click', async () => {
            const btn = document.getElementById('submit-code');
            const code = document.getElementById('code-editor').value;
            
            btn.textContent = "Analyzing...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/coding/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question_id: currentQuestionId,
                        code: code,
                        email: localStorage.getItem('user_email')
                    })
                });
                
                const data = await res.json();
                
                document.getElementById('ai-feedback').innerHTML = `
                    <h3>${data.title}</h3>
                    <div style="background:rgba(255,255,255,0.03); padding:20px; border-radius:8px; margin-top:20px;">
                        <pre>${data.evaluation}</pre>
                    </div>
                `;
                document.getElementById('result-modal').style.display = 'flex';

            } catch (e) {
                alert("Submission failed");
                btn.textContent = "Submit Solution";
                btn.disabled = false;
            }
        });

        // Logout handler
        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/login';
        });

        init();

        // Prevent tab key from leaving textarea
        document.getElementById('code-editor').addEventListener('keydown', function(e) {
            if (e.key == 'Tab') {
                e.preventDefault();
                var start = this.selectionStart;
                var end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });
    </script>
</body>
</html>
